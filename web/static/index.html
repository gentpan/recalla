<body class="dark font-sans">
<!-- 登录页 -->
<div id="login-page" class="flex items-center justify-center h-screen">
  <div class="card w-96">
    <h1 class="text-xl font-bold font-mono mb-1"><span class="inline-block w-4 h-4 bg-accent mr-2" style="vertical-align:middle"></span><span class="font-logo">recalla</span></h1>
    <p class="text-xs text-fg-3 mb-6" id="l-sub">memory infrastructure</p>
    <div class="space-y-4">
      <div><label class="text-xs text-fg-3 mb-1 block" id="l-ul"></label><input id="l-u" class="font-mono text-sm" value="admin"></div>
      <div><label class="text-xs text-fg-3 mb-1 block" id="l-pl"></label><input type="password" id="l-p" class="font-mono text-sm" value=""></div>
      <button class="btn bp w-full" onclick="doLogin()" id="l-btn"></button>
      <p id="l-err" class="text-danger text-xs font-mono hidden"></p>
    </div>
  </div>
</div>

<!-- 主界面 -->
<div id="app" class="flex h-screen hidden">
  <aside class="w-56 bg-bg-2 border-r border-border flex flex-col shrink-0">
    <div class="p-5 border-b border-border">
      <h1 class="text-lg font-bold font-mono tracking-tight cursor-pointer" onclick="nav('overview')"><span class="inline-block w-4 h-4 bg-accent mr-2" style="vertical-align:middle"></span><span class="font-logo">recalla</span></h1>
      <p class="text-xs text-fg-3 mt-1" id="nav-user"></p>
    </div>
    <nav class="flex-1 py-2" id="nav-list">
      <div class="nav-item active" data-page="overview" onclick="nav('overview')" data-i18n="overview"></div>
      <div class="nav-item" data-page="memories" onclick="nav('memories')" data-i18n="memories"></div>
      <div class="nav-item" data-page="sessions" onclick="nav('sessions')" data-i18n="sessions"></div>
      <div class="nav-item" data-page="projects" onclick="nav('projects')" data-i18n="projects"></div>
      <div class="nav-item" data-page="teams" onclick="nav('teams')">Teams</div>
      <div class="nav-item" data-page="github" onclick="nav('github')" data-i18n="github"></div>
      <div class="nav-item" data-page="docs" onclick="nav('docs')" data-i18n="docs"></div>
      <div class="nav-item" data-page="settings" onclick="nav('settings')" data-i18n="settings"></div>
      <div class="nav-item" data-page="account" onclick="nav('account')" data-i18n="account"></div>
    </nav>
    <div class="p-4 border-t border-border flex items-center justify-between">
      <button class="text-xs text-fg-3 font-mono hover:text-danger cursor-pointer" onclick="logout()" id="nav-logout"></button>
      <div class="flex gap-1">
        <button class="text-xs font-mono px-2 py-1 cursor-pointer" onclick="setLang('en')" style="color:${LANG==='en'?'#0052D9':'#6b7080'}">EN</button>
        <button class="text-xs font-mono px-2 py-1 cursor-pointer" onclick="setLang('zh')" style="color:${LANG==='zh'?'#0052D9':'#6b7080'}">中</button>
      </div>
    </div>
  </aside>
  <main class="flex-1 overflow-y-auto" id="main"></main>
</div>

const L=k=>I[LANG]?.[k]||I.en[k]||k;
function setLang(l){LANG=l;localStorage.setItem('lang',l);location.reload()}
const E=s=>(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
const T=s=>{try{return new Date(s).toLocaleString()}catch{return'—'}};
const TC={decision:'text-warn',code:'text-accent',note:'text-fg-2',conversation:'text-success',session:'text-fg-3'};
function toast(m,e){const el=document.getElementById('toast');el.textContent=m;el.style.borderColor=e?'#f38ba8':'#0052D9';el.style.display='block';setTimeout(()=>el.style.display='none',3000)}

async function api(method,path,body){
  try{const o={method,headers:{'Content-Type':'application/json'}};
  if(TOKEN)o.headers['Authorization']='Bearer '+TOKEN;
  if(body)o.body=JSON.stringify(body);
  const r=await fetch(path,o);const d=await r.json();
  if(!r.ok){if(r.status===401){logout();return null}toast(d.error||'Error',true);return null}return d}
  catch(e){toast('Network error',true);return null}}

// 登录
async function doLogin(){
  const u=document.getElementById('l-u').value,p=document.getElementById('l-p').value;
  const d=await api('POST','/api/auth/login',{username:u,password:p});
  if(!d)return;TOKEN=d.token;USER=d.user;
  localStorage.setItem('token',TOKEN);
  document.getElementById('login-page').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');
  document.getElementById('nav-user').textContent=USER.username+' ('+USER.role+')';
  nav('overview');
}
function logout(){TOKEN='';USER=null;localStorage.removeItem('token');location.reload()}

// i18n 渲染静态元素
function renderI18n(){
  document.getElementById('l-sub').textContent=L('memInfra');
  document.getElementById('l-ul').textContent=L('username');
  document.getElementById('l-pl').textContent=L('password');
  document.getElementById('l-btn').textContent=L('login');
  document.getElementById('nav-logout').textContent=L('logout');
  document.querySelectorAll('[data-i18n]').forEach(el=>{el.textContent=L(el.dataset.i18n)});
}

// 自动登录
(function(){
  renderI18n();
  const t=localStorage.getItem('token');
  if(t){TOKEN=t;api('GET','/api/auth/me').then(d=>{
    if(d){USER=d;document.getElementById('login-page').classList.add('hidden');document.getElementById('app').classList.remove('hidden');document.getElementById('nav-user').textContent=USER.username+' ('+USER.role+')';nav('overview')}
  })}
  document.getElementById('l-p').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin()});
})();

// 导航
let CP='overview';
function nav(p,a){CP=p;document.querySelectorAll('.nav-item').forEach(n=>n.classList.toggle('active',n.dataset.page===p));
({overview:pgO,memories:pgM,sessions:pgS,projects:pgP,settings:pgCfg,account:pgAcc,docs:pgDocs,github:pgGH,teams:pgTeams,teamDetail:pgTeamDetail,projectDetail:pgPD}[p]||pgO)(a)}

// 记忆卡片
function mc(m,rl){const tags=(m.tags||[]).map(t=>`<span class="tag">${E(t)}</span>`).join('');
const sc=m.score?`<span class="text-xs font-mono text-accent">${(m.score*100).toFixed(0)}%</span>`:'';
return`<div class="mi"><div class="flex items-center justify-between mb-2"><div class="flex items-center gap-3"><span class="text-xs font-mono ${TC[m.type]||'text-fg-3'} uppercase">${m.type||'note'}</span><span class="text-xs font-mono text-fg-3">${E(m.project)}</span>${sc}</div><div class="flex items-center gap-3"><span class="text-xs text-fg-3">${T(m.created_at)}</span><button class="bd btn" style="padding:4px 10px;font-size:12px" onclick="delM('${m.id}','${rl||''}')">×</button></div></div><p class="text-sm font-mono whitespace-pre-wrap mb-2">${E((m.content||'').substring(0,600))}</p><div>${tags}</div></div>`}
async function delM(id,rl){if(!confirm(L('confirm')))return;await api('DELETE','/api/memory/'+id);toast(L('deleted'));if(rl)nav(CP,rl);else nav(CP)}

// Overview
async function pgO(){document.getElementById('main').innerHTML=`<div class="p-8"><h2 class="text-xl font-bold font-mono mb-6">${L('overview')}</h2><div class="grid grid-cols-4 gap-4 mb-8" id="st"></div><h3 class="text-sm font-mono text-fg-3 uppercase tracking-wider mb-4">${L('recentMem')}</h3><div id="rc"></div></div>`;
const d=await api('GET','/api/stats');if(!d)return;
document.getElementById('st').innerHTML=`<div class="card"><p class="text-xs text-fg-3 uppercase tracking-wider mb-2">${L('memories')}</p><p class="text-3xl font-bold font-mono text-accent">${d.memories||0}</p></div><div class="card"><p class="text-xs text-fg-3 uppercase tracking-wider mb-2">${L('projects')}</p><p class="text-3xl font-bold font-mono text-success">${d.projects||0}</p></div><div class="card"><p class="text-xs text-fg-3 uppercase tracking-wider mb-2">${L('sessions')}</p><p class="text-3xl font-bold font-mono text-warn">${d.sessions||0}</p></div><div class="card"><p class="text-xs text-fg-3 uppercase tracking-wider mb-2">${L('status')}</p><p class="text-3xl font-bold font-mono text-success">●</p></div>`;
document.getElementById('rc').innerHTML=(d.recent_memories||[]).map(m=>mc(m)).join('')||`<p class="text-fg-3 text-sm font-mono">${L('noMem')}</p>`}

// Memories
async function pgM(){const d=await api('GET','/api/stats');const ps=d?.project_list||[];
document.getElementById('main').innerHTML=`<div class="p-8"><div class="flex items-center justify-between mb-6"><h2 class="text-xl font-bold font-mono">${L('memories')}</h2><button class="btn bp text-sm" onclick="showAdd()">${L('newMem')}</button></div><div class="flex gap-3 mb-6"><input id="sq" placeholder="${L('search')}..." class="flex-1 font-mono text-sm"><select id="sp" class="w-44 font-mono text-sm"><option value="">${L('allProj')}</option>${ps.map(p=>`<option>${p}</option>`).join('')}</select><select id="stp" class="w-32 font-mono text-sm"><option value="">${L('allTypes')}</option><option>conversation</option><option>code</option><option>decision</option><option>note</option><option>session</option></select><button class="btn bp text-sm" onclick="doSr()">${L('search')}</button></div><div id="ml"></div></div>`;

async function tdTab(tab,teamID){
  document.querySelectorAll('.tab').forEach(n=>n.classList.toggle('active',n.dataset.tab===tab));
  const el=document.getElementById('td-content');

  switch(tab){
    case 'members': {
      const d=await api('GET','/api/teams/'+teamID+'/members');
      el.innerHTML=`<div class="mb-4 flex gap-3">
        <input id="inv-user" placeholder="${L('inviteUser')}" class="font-mono text-sm flex-1">
        <button class="btn bp text-sm" onclick="inviteUser('${teamID}')">${L('invite')}</button>
      </div>
      <table><thead><tr><th>${L('username')}</th><th>${L('role')}</th><th>${L('joinedAt')}</th><th></th></tr></thead>
      <tbody>${(d?.members||[]).map(m=>`<tr>
        <td class="font-mono text-sm">${E(m.username)}</td>
        <td class="font-mono text-sm ${m.role==='owner'?'text-accent':''}">${m.role}</td>
        <td class="text-sm text-fg-3">${T(m.joined_at)}</td>
        <td>${m.role!=='owner'?`<button class="bd btn" style="padding:4px 8px;font-size:11px" onclick="rmMember('${teamID}','${m.user_id}')">x</button>`:''}</td>
      </tr>`).join('')}</tbody></table>`;
      break;
    }
    case 'projects': {
      const d=await api('GET','/api/teams/'+teamID+'/projects');
      el.innerHTML=`<div class="mb-4 flex gap-3">
        <input id="add-proj" placeholder="${L('projectName')}" class="font-mono text-sm flex-1">
        <button class="btn bp text-sm" onclick="addTeamProj('${teamID}')">${L('addProject')}</button>
      </div>
      ${(d?.projects||[]).length?d.projects.map(p=>`<div class="card mb-2"><span class="font-mono">${E(p)}</span></div>`).join(''):`<p class="text-fg-3 text-sm font-mono">${L('noLinked')}</p>`}`;
      break;
    }
    case 'shared': {
      const d=await api('GET','/api/teams/'+teamID+'/memories');
      el.innerHTML=(d?.memories||[]).map(m=>mc(m)).join('')||`<p class="text-fg-3 text-sm font-mono">${L('noShared')}</p>`;
      break;
    }
    case 'search': {
      el.innerHTML=`<div class="flex gap-3 mb-4">
        <input id="ts-q" placeholder="${L('searchTeamMem')}" class="font-mono text-sm flex-1">
        <button class="btn bp text-sm" onclick="teamSearch('${teamID}')">${L('search')}</button>
      </div><div id="ts-results"></div>`;
      break;
    }
    case 'activity': {
      const d=await api('GET','/api/teams/'+teamID+'/detail');
      const acts=d?.activities||[];
      el.innerHTML=acts.length?acts.map(a=>`<div class="flex items-center gap-3 p-3 border-b border-bg-3">
        <span class="font-mono text-sm text-accent">${E(a.username||'—')}</span>
        <span class="text-sm">${E(a.action)}</span>
        <span class="text-sm text-fg-3">${E(a.detail)}</span>
        <span class="text-xs text-fg-3 ml-auto">${T(a.created_at)}</span>
      </div>`).join(''):`<p class="text-fg-3 text-sm font-mono">${L('noActivity')}</p>`;
      break;
    }
  }
}

async function ghCommits(fullName){
  const el=document.getElementById('gh-commits');
  el.classList.remove('hidden');

  el.scrollIntoView({behavior:'smooth'});

  const [owner,repo]=fullName.split('/');
  const d=await api('GET','/api/github/repos/'+owner+'/'+repo+'/commits');
  if(!d||!d.commits){
    document.getElementById('gh-cl').innerHTML='<p class="text-danger text-sm font-mono">Failed to load commits.</p>';
    return;
  }
  document.getElementById('gh-cl').innerHTML=`<table>
    <thead><tr><th>SHA</th><th>${L('message')}</th><th>${L('author')}</th><th>${L('time')}</th></tr></thead>

function addPreset(name){
  if(name==='custom'){
    const n=prompt(L('enterProviderName'))||'';
    if(!n)return;
    cfgProviders.push({name:n,url:'',key:'',embed_model:'',llm_model:'',embedding_dim:1024});
  } else {
    if(cfgProviders.find(p=>p.name===name))return toast(name+' already exists',true);
    const pr=PRESETS[name];
    cfgProviders.push({name:pr.name,url:pr.url,key:'',embed_model:pr.embed_model,llm_model:pr.llm_model,embedding_dim:pr.embedding_dim});
  }
  if(!cfgActiveEmbed){const ep=cfgProviders.find(p=>{const pr=PRESETS[p.name];return !pr||pr.embed});if(ep)cfgActiveEmbed=ep.name}
  if(!cfgActiveLLM&&cfgProviders.length)cfgActiveLLM=cfgProviders[0].name;
  renderCfg({github_token:document.getElementById('c-gt')?.value,github_owner:document.getElementById('c-go')?.value,github_webhook_secret:document.getElementById('c-gw')?.value});
}

function rmProvider(i){
  const name=cfgProviders[i].name;
  cfgProviders.splice(i,1);
  if(cfgActiveEmbed===name)cfgActiveEmbed=cfgProviders[0]?.name||'';
  if(cfgActiveLLM===name)cfgActiveLLM=cfgProviders[0]?.name||'';
  renderCfg({github_token:document.getElementById('c-gt')?.value,github_owner:document.getElementById('c-go')?.value,github_webhook_secret:document.getElementById('c-gw')?.value});
}

async function saveCfg(){
  const b={
    providers:cfgProviders,
    active_embedding:cfgActiveEmbed,
    active_llm:cfgActiveLLM,
    github_token:document.getElementById('c-gt')?.value||'',
    github_owner:document.getElementById('c-go')?.value||'',
    github_webhook_secret:document.getElementById('c-gw')?.value||''
  };
  const r=await api('POST','/api/settings',b);
  if(r)toast(L('settingsSaved'))
}

function showSyncModal(){
  const o=document.createElement('div');o.className='modal-bg';o.id='modal';o.onclick=e=>{if(e.target===o)o.remove()};
  o.innerHTML=`<div class="card w-[650px]">

    <p class="text-sm text-fg-2 mb-4">${L('syncDesc')}</p>
    <div class="mb-4">

      <input id="sync-device" class="font-mono text-sm" placeholder="Macbook / Mac Studio / Ubuntu">
    </div>
    <div class="border border-border border-dashed p-8 text-center mb-4 cursor-pointer hover:border-accent" onclick="document.getElementById('sync-files').click()">
      <p class="text-fg-3 text-sm font-mono">${L('clickSelect')}</p>
      <p class="text-xs text-fg-3 mt-2" id="sync-status"></p>
      <input type="file" id="sync-files" multiple accept=".jsonl" style="display:none" onchange="onSyncFiles(this)">
    </div>
    <div class="flex gap-4">
      <button class="btn bp text-sm" onclick="doSync()" id="sync-btn" disabled>${L('startSync')}</button>
      <button class="btn bg text-sm" onclick="document.getElementById('modal').remove()">${L('cancel')}</button>
    </div>
    <div id="sync-log" class="mt-4 max-h-48 overflow-y-auto"></div>
  </div>`;
  document.body.appendChild(o);
}
let syncParsed=[];
function onSyncFiles(input){
  const files=Array.from(input.files);
  document.getElementById('sync-status').textContent=files.length+' '+L('filesSelected');
  document.getElementById('sync-btn').disabled=false;
  syncParsed=[];
  let loaded=0;
  files.forEach(f=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const lines=reader.result.split('\n').filter(Boolean);
      const msgs=[];let project=f.name.replace('.jsonl','');
      lines.forEach(line=>{try{const e=JSON.parse(line);
        if(e.cwd){const p=e.cwd.split('/');project=p[p.length-1]||project}
        if(e.type==='queue-operation'&&e.operation==='enqueue'){const c=e.content;if(typeof c==='string'&&c.length>5)msgs.push(c.substring(0,500))}
      }catch{}});
      if(msgs.length>0){
        let summary=msgs.slice(0,10).join('\n---\n');
        if(msgs.length>15){summary+='\n... ('+msgs.length+' total) ...\n'+msgs.slice(-5).join('\n---\n')}
        if(summary.length>5000)summary=summary.substring(0,5000)+'\n...(truncated)';
        syncParsed.push({project:project.replace(/-Users-pan-projects-/g,'').replace(/-Users-pan-/g,'').split('--claude-worktrees-')[0],session_id:f.name.replace('.jsonl',''),content:summary,messages:msgs.length});
      }
      loaded++;
      if(loaded===files.length)document.getElementById('sync-status').textContent=syncParsed.length+'/'+files.length+' '+L('validSessions')+' ('+syncParsed.reduce((a,s)=>a+s.messages,0)+' '+L('messages')+')';
    };reader.readAsText(f);
  });
}
async function doSync(){
  if(!syncParsed.length)return;
  const device=document.getElementById('sync-device').value||'Unknown';
  const log=document.getElementById('sync-log');
  const btn=document.getElementById('sync-btn');
  btn.disabled=true;btn.textContent=L('syncing');
  const sessions=syncParsed.map(s=>({...s,device,branch:''}));
  const d=await api('POST','/api/sessions/import',{sessions});
  if(d){
    log.innerHTML='<p class="text-success text-sm font-mono">'+L('syncDone')+': '+d.imported+'/'+d.total+'</p>';
    btn.textContent=L('syncDone');
    setTimeout(()=>{document.getElementById('modal')?.remove();nav('sessions')},2000);
  }else{btn.disabled=false;btn.textContent=L('retry')}
}
</script>
